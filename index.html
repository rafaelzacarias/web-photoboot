<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Photobooth</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
        color: #f5f5f5;
        background: #0f0f0f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .photobooth {
        width: min(90vw, 820px);
        display: grid;
        gap: 1rem;
      }

      .frame {
        position: relative;
        border: 3px solid #2d2d2d;
        border-radius: 0.5rem;
        overflow: hidden;
        background: #000;
      }

      video,
      canvas,
      img {
        width: 100%;
        height: auto;
        display: block;
      }

      canvas {
        display: none;
      }

      .countdown {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: clamp(2.5rem, 12vw, 6rem);
        font-weight: bold;
        color: #fff;
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.85);
        pointer-events: none;
      }

      .controls {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1.1rem;
        font-weight: 700;
        cursor: pointer;
      }

      #start {
        background: #2e7d32;
        color: #fff;
      }

      #shutter {
        background: #c62828;
        color: #fff;
      }

      #status {
        margin: 0;
        min-height: 1.2rem;
      }

      .capture {
        border: 1px solid #2d2d2d;
        border-radius: 0.5rem;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <main class="photobooth">
      <section class="frame">
        <video id="preview" autoplay playsinline muted></video>
        <canvas id="buffer"></canvas>
        <div id="countdown" class="countdown"></div>
      </section>

      <section class="controls">
        <button id="start" type="button">Enable Camera</button>
        <button id="shutter" type="button" disabled>Shutter</button>
      </section>

      <p id="status">Allow camera access to begin.</p>

      <section class="capture">
        <img id="photo" alt="Your captured photo will appear here." />
      </section>
    </main>

    <script>
      const preview = document.getElementById("preview");
      const buffer = document.getElementById("buffer");
      const photo = document.getElementById("photo");
      const startButton = document.getElementById("start");
      const shutterButton = document.getElementById("shutter");
      const statusText = document.getElementById("status");
      const countdownText = document.getElementById("countdown");

      let stream;
      let countdownInProgress = false;

      const setStatus = (message) => {
        statusText.textContent = message;
      };

      const startCamera = async () => {
        if (stream) {
          return;
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false,
          });
          preview.srcObject = stream;
          shutterButton.disabled = false;
          setStatus("Camera ready. Press shutter!");
        } catch (error) {
          setStatus("Unable to access camera. Please allow camera permission.");
          console.error(error);
        }
      };

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const runCountdown = async (seconds) => {
        countdownInProgress = true;

        for (let i = seconds; i > 0; i -= 1) {
          countdownText.textContent = i;
          await wait(1000);
        }

        countdownText.textContent = "";
        countdownInProgress = false;
      };

      const takePhoto = () => {
        const width = preview.videoWidth;
        const height = preview.videoHeight;

        if (!width || !height) {
          setStatus("Camera is still starting. Please try again.");
          return;
        }

        buffer.width = width;
        buffer.height = height;
        const context = buffer.getContext("2d");
        context.drawImage(preview, 0, 0, width, height);
        photo.src = buffer.toDataURL("image/png");
        setStatus("Photo captured!");
      };

      startButton.addEventListener("click", startCamera);

      shutterButton.addEventListener("click", async () => {
        if (!stream || countdownInProgress) {
          return;
        }

        setStatus("Get ready...");
        await runCountdown(3);
        takePhoto();
      });
    </script>
  </body>
</html>
